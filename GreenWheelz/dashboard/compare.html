<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GreenWheelz Compare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0d2a4d;
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    width:100%;
    height:70px;
    background:#7fd6c7;

    display:flex;
    align-items:center;

    position:fixed;
    top:0;
    left:0;

    z-index:1000;
}

.logo{
    margin-left:30px;
    display:flex;
    align-items:center;
}

.logo img{
    width:280px;
    display:block;
}

/* NAV LINKS */

.nav-links{
    display:flex;
    gap:55px;
    list-style:none;

    position:absolute;
    left:50%;
    transform:translateX(-50%);
}

.nav-links a{
    text-decoration:none;
    color:#0d2a4d;
    font-size:15px;
    font-weight:600;
    letter-spacing:1px;
    transition:color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    user-select:none;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    outline:none;
}

.active{
    border-bottom:3px solid #0d2a4d;
    padding-bottom:5px;
    font-weight:600;
}

.nav-links a:hover{
    color:white;
}

.nav-links a:focus{
    outline:none;
    font-weight:600;
}

.nav-links a:visited{
    color:#0d2a4d;
    font-weight:600;
}

/* BRAND */
.brand-section{
    margin-top:70px;
    width:100%;
    background:#ececec;

    border-bottom-left-radius:35px;
    border-bottom-right-radius:35px;

    padding:40px 0 28px;
}

.brand-container{
    display:flex;
    justify-content:center;
    align-items:center;

    gap:16px;
    flex-wrap:wrap;
}

.brand-btn{
    width:122px;
    height:48px;

    border:none;
    border-radius:30px;

    background:#6ed5c1;
    color:#0d2a4d;

    font-size:15px;
    font-weight:700;

    cursor:pointer;

    transition:.3s;
}

.brand-btn:hover{
    transform:translateY(-4px);
}

.active-brand{
    outline:3px solid #0d2a4d;
}

/* CARS */
.cars-container{
    display:flex;
    justify-content:center;
    align-items:flex-end;

    gap:35px;
    flex-wrap:wrap;

    padding:30px 20px;
}

.car{
    text-align:center;
}

.car img{
    width:300px;

    filter:drop-shadow(0 12px 18px rgba(0,0,0,.55));

    transition:.3s;
}

.car img:hover{
    transform:scale(1.05);
}

.center-car img{
    width:360px;
}

/* BUTTONS */
.car-buttons{
    margin-top:15px;

    display:flex;
    flex-direction:column;
    align-items:center;

    gap:10px;
}

.car-name-btn{
    width:220px;
    height:45px;

    border:none;
    border-radius:30px;

    background:#ececec;

    font-weight:700;
}

.compare-btn{
    width:150px;
    height:45px;

    border:none;
    border-radius:30px;

    background:#6ed5c1;

    font-weight:700;

    cursor:pointer;

    transition:.3s;
}

.compare-btn:hover{
    transform:scale(1.05);
}

/* INFO CARD */
.info-card{
    width:490px;

    background:#ececec;

    margin:20px auto 50px;

    border-radius:35px;

    padding:25px 35px;

    box-shadow:0 12px 22px rgba(0,0,0,.30);
}

.info-card h2{
    text-align:center;
    margin-bottom:12px;
}

.info-card p{
    line-height:1.7;
}

/* COMPARE MODAL */

.compare-modal{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.7);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:9999;
}

.compare-box{
    width:90%;
    max-width:750px;

    background:#ececec;

    border-radius:30px;

    padding:30px;
}

.compare-box h2{
    text-align:center;
    margin-bottom:20px;
}

.compare-box table{
    width:100%;
    border-collapse:collapse;
}

.compare-box th,
.compare-box td{
    border:1px solid #999;
    padding:14px;
    text-align:center;
}

.compare-box th{
    background:#6ed5c1;
}

#closeCompare{
    margin-top:20px;

    width:100%;
    height:45px;

    border:none;
    border-radius:30px;

    background:#6ed5c1;

    font-weight:700;

    cursor:pointer;
}

/* RESPONSIVE */

@media(max-width:768px){

    .nav-links{
        gap:20px;
    }

    .car img{
        width:220px;
    }

    .center-car img{
        width:260px;
    }

    .info-card{
        width:90%;
    }

}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="logo">
        <img src="logo.png">
    </div>

    <ul class="nav-links">
        <li><a href="dashboard.html">HOME</a></li>
        <li><a href="compare.html" class="active">COMPARE</a></li>
        <li><a href="guide.html">GUIDE</a></li>
        <li><a href="contacts.html">CONTACTS</a></li>
    </ul>

</nav>

<!-- BRAND -->
<section class="brand-section">

    <div class="brand-container">

        <button class="brand-btn">BYD</button>
        <button class="brand-btn active-brand">GEELY</button>
        <button class="brand-btn">TESLA</button>
        <button class="brand-btn">BMW</button>
        <button class="brand-btn">TOYOTA</button>
        <button class="brand-btn">KIA</button>
        <button class="brand-btn">HYUNDAI</button>
        <button class="brand-btn">HONDA</button>

    </div>

</section>

<!-- CARS -->
<section class="cars-container">

    <div class="car car-left">

        <img src="geely g6.png">

        <div class="car-buttons">
            <button class="car-name-btn">GEELY G6</button>
            <button class="compare-btn">COMPARE</button>
        </div>

    </div>

    <div class="car center-car">

        <img src="geelyex5.png">

        <div class="car-buttons">
            <button class="car-name-btn">GEELY EX5</button>
            <button class="compare-btn">COMPARE</button>
        </div>

    </div>

    <div class="car car-right">

        <img src="geelygeometryc.png">

        <div class="car-buttons">
            <button class="car-name-btn">GEELY GEOMETRY C</button>
            <button class="compare-btn">COMPARE</button>
        </div>

    </div>

</section>

<!-- INFO CARD -->
<div class="info-card">

    <h2>Geely EX5</h2>

    <p>
        <b>Long range:</b> 430 km<br>
        <b>Speed:</b> 6.9 sec<br>
        <b>Charging:</b> 20 mins
    </p>

</div>

<!-- COMPARE MODAL -->
<div class="compare-modal" id="compareModal">

    <div class="compare-box">

        <h2>Car Comparison</h2>

        <table>

            <tr>
                <th>Specs</th>
                <th id="compareCar1">Car 1</th>
                <th id="compareCar2">Car 2</th>
            </tr>

            <tr>
                <td>Range</td>
                <td id="range1"></td>
                <td id="range2"></td>
            </tr>

            <tr>
                <td>Speed</td>
                <td id="speed1"></td>
                <td id="speed2"></td>
            </tr>

            <tr>
                <td>Charging</td>
                <td id="charge1"></td>
                <td id="charge2"></td>
            </tr>

        </table>

        <button id="closeCompare">CLOSE</button>

    </div>

</div>

<script>

/* ELEMENTS */
const brandButtons = document.querySelectorAll(".brand-btn");

const leftCar = document.querySelector(".car-left img");
const centerCar = document.querySelector(".center-car img");
const rightCar = document.querySelector(".car-right img");

const leftName = document.querySelector(".car-left .car-name-btn");
const centerName = document.querySelector(".center-car .car-name-btn");
const rightName = document.querySelector(".car-right .car-name-btn");

const title = document.querySelector(".info-card h2");
const info = document.querySelector(".info-card p");

/* CAR DATA */
const cars = {

    BYD:{
        left:"byddoplin.png",
        center:"bydatto3.png",
        right:"sealionbyd.png",

        leftName:"BYD DOLPHIN",
        centerName:"BYD ATTO 3",
        rightName:"BYD SEALION",

        title:"BYD Seal",

        range:"510 km",
        speed:"Fast",
        charge:"30 mins",

        info:`<b>Long range:</b> 510 km<br>
        <b>Speed:</b> Fast<br>
        <b>Charging:</b> 30 mins`
    },

    GEELY:{
        left:"geely g6.png",
        center:"geelyex5.png",
        right:"geelygeometryc.png",

        leftName:"GEELY G6",
        centerName:"GEELY EX5",
        rightName:"GEELY GEOMETRY C",

        title:"Geely EX5",

        range:"430 km",
        speed:"6.9 sec",
        charge:"20 mins",

        info:`<b>Long range:</b> 430 km<br>
        <b>Speed:</b> 6.9 sec<br>
        <b>Charging:</b> 20 mins`
    },

    TESLA:{
        left:"teslaX.png",
        center:"tesla3.png",
        right:"teslaS.png",

        leftName:"TESLA MODEL X",
        centerName:"TESLA MODEL 3",
        rightName:"TESLA MODEL S",

        title:"Tesla Model 3",

        range:"629 km",
        speed:"3.1 sec",
        charge:"Supercharger",

        info:`<b>Long range:</b> 629 km<br>
        <b>Speed:</b> 3.1 sec<br>
        <b>Charging:</b> Supercharger`
    },

    BMW:{
        left:"bmw-i4.png",
        center:"bmw-iX.png",
        right:"bmw-i7.png",

        leftName:"BMW i4",
        centerName:"BMW iX",
        rightName:"BMW i7",

        title:"BMW iX",

        range:"500 km",
        speed:"4.5 sec",
        charge:"35 mins",

        info:`<b>Luxury EV</b>`
    },

    TOYOTA:{
    left:"toyota-prius.png",
    center:"toyota-chr.png",
    right:"toyota-chr.png",

    leftName:"TOYOTA PRIUS",
    centerName:"TOYOTA BZ4X",
    rightName:"TOYOTA C-HR",

    title:"Toyota bZ4X",

    range:"516 km",
    speed:"7.5 sec",
    charge:"30 mins",

    info:`
    <b>Battery:</b> 71.4 kWh<br>
    <b>Range:</b> 516 km WLTP<br>
    <b>Power:</b> 214 hp`
},

KIA:{
    left:"SORENTO.png",
    center:"SPORTAGE.png",
    right:"kiaev9.png",

    leftName:"SORENTO EV",
    centerName:"SPORTAGE EV",
    rightName:"KIA EV9",

    title:"SPORTAGE EV",

    range:"528 km",
    speed:"3.5 sec",
    charge:"18 mins",

    info:`
    <b>Battery:</b> 77.4 kWh<br>
    <b>Range:</b> 528 km WLTP<br>
    <b>Power:</b> 576 hp`
},

HYUNDAI:{
    left:"TUCSON.png",
    center:"PALISADE.png",
    right:"ELANTRA.png",

    leftName:"TUCSON EV",
    centerName:"PALISADE EV",
    rightName:"ELANTRA EV",

    title:"Hyundai Palisade EV",

    range:"507 km",
    speed:"5.2 sec",
    charge:"18 mins",

    info:`
    <b>Battery:</b> 77.4 kWh<br>
    <b>Range:</b> 507 km WLTP<br>
    <b>Power:</b> 325 hp<br>
    <b>Torque:</b> 605 Nm<br>
    <b>0-100 km/h:</b> 5.2 sec<br>
    <b>Top Speed:</b> 185 km/h`
},

HONDA:{
    left:"HRV.png",
    center:"CRV.png",
    right:"CIVIC.png",

    leftName:"HONDA HR-V EV",
    centerName:"HONDA CR-V EV",
    rightName:"HONDA CIVIC EV",

    title:"Honda CR-V EV",

    range:"510 km",
    speed:"7.7 sec",
    charge:"40 mins",

    info:`
    <b>Battery:</b> 68.8 kWh<br>
    <b>Range:</b> 510 km CLTC<br>
    <b>Power:</b> 201 hp<br>
    <b>Torque:</b> 310 Nm<br>
    <b>0-100 km/h:</b> 7.7 sec<br>
    <b>Top Speed:</b> 150 km/h`
},

};

/* BRAND CLICK */
brandButtons.forEach(btn=>{

    btn.addEventListener("click",()=>{

        brandButtons.forEach(b=>{
            b.classList.remove("active-brand");
        });

        btn.classList.add("active-brand");

        const brand = btn.textContent.trim();

        const car = cars[brand];

        if(!car) return;

        leftCar.src = car.left;
        centerCar.src = car.center;
        rightCar.src = car.right;

        leftName.innerHTML = car.leftName;
        centerName.innerHTML = car.centerName;
        rightName.innerHTML = car.rightName;

        title.innerHTML = car.title;
        info.innerHTML = car.info;

    });

});


let compareList = [];

const compareModal = document.getElementById("compareModal");

const compareCar1 = document.getElementById("compareCar1");
const compareCar2 = document.getElementById("compareCar2");

const range1 = document.getElementById("range1");
const range2 = document.getElementById("range2");

const speed1 = document.getElementById("speed1");
const speed2 = document.getElementById("speed2");

const charge1 = document.getElementById("charge1");
const charge2 = document.getElementById("charge2");

/* COMPARE BUTTON */
document.querySelectorAll(".compare-btn").forEach(btn=>{

    btn.addEventListener("click",()=>{

        const activeBrand =
            document.querySelector(".active-brand").textContent.trim();

        const selectedCar = cars[activeBrand];

        if(!selectedCar) return;

        compareList.push(selectedCar);

        if(compareList.length === 2){

            const car1 = compareList[0];
            const car2 = compareList[1];

            compareCar1.innerHTML = car1.title;
            compareCar2.innerHTML = car2.title;

            range1.innerHTML = car1.range;
            range2.innerHTML = car2.range;

            speed1.innerHTML = car1.speed;
            speed2.innerHTML = car2.speed;

            charge1.innerHTML = car1.charge;
            charge2.innerHTML = car2.charge;

            compareModal.style.display = "flex";

            compareList = [];
        }

    });

});

/* CLOSE */
document
.getElementById("closeCompare")
.addEventListener("click",()=>{

    compareModal.style.display = "none";

});

</script>

</body>
</html>
