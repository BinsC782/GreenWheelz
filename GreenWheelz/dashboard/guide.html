<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GreenWheelz Interactive Guide</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- LEAFLET CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0d2a4d;
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    width:100%;
    height:70px;
    background:#7fd6c7;

    display:flex;
    align-items:center;

    position:fixed;
    top:0;
    left:0;

    z-index:1000;
}

.logo{
    margin-left:30px;
    display:flex;
    align-items:center;
}

.logo img{
    width:280px;
    display:block;
}

/* NAV LINKS */

.nav-links{
    display:flex;
    gap:55px;
    list-style:none;

    position:absolute;
    left:50%;
    transform:translateX(-50%);
}

.nav-links a{
    text-decoration:none;
    color:#0d2a4d;
    font-size:15px;
    font-weight:600;
    letter-spacing:1px;
    transition:color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    user-select:none;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    outline:none;
}

.active{
    border-bottom:3px solid #0d2a4d;
    padding-bottom:5px;
    font-weight:600;
}

.nav-links a:hover{
    color:white;
}

.nav-links a:focus{
    outline:none;
    font-weight:600;
}

.nav-links a:visited{
    color:#0d2a4d;
    font-weight:600;
}

/* MAIN CONTAINER */

.main-container{
    display:flex;
    width:100%;
    padding-top:70px;
}

/* SIDEBAR */

#sidebar{
    width:320px;
    min-height:calc(100vh - 70px);
    background:#10294b;
    color:white;
    padding:30px 25px;
    z-index:1000;
    box-shadow:4px 0 10px rgba(0,0,0,.3);
}

#sidebar h2{
    color:#6ed5c1;
    margin-bottom:10px;
    font-size:30px;
    font-style:italic;
}

#sidebar p{
    margin-bottom:25px;
    color:#d7d7d7;
}

/* BUTTONS */

.filter-btn{
    width:100%;
    height:50px;
    border:none;
    border-radius:30px;
    margin-bottom:15px;
    background:#ececec;
    color:#0d2a4d;
    font-size:15px;
    font-style:italic;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 8px 18px rgba(0,0,0,.25);
}

.filter-btn:hover{
    background:#6ed5c1;
}

.filter-btn.active-btn{
    background:#6ed5c1;
}

/* TIP BOX */

.tip-box{
    background:#ececec;
    color:#0d2a4d;
    padding:20px;
    border-radius:30px;
    margin-top:40px;
    text-align:center;
    border:4px solid #6ed5c1;
    box-shadow:0 8px 18px rgba(0,0,0,.25);
}

.tip-box small{
    font-weight:700;
    color:#4d4d4d;
}

.tip-box h4{
    margin:12px 0;
    color:#0d2a4d;
}

.tip-box p{
    color:#555;
    margin:0;
}

/* MAP */

#map{
    flex:1;
    height:calc(100vh - 70px);
}

/* RESPONSIVE */

@media(max-width:900px){
    .main-container{
        flex-direction:column;
    }
    #sidebar{
        width:100%;
        min-height:auto;
    }
    #map{
        width:100%;
        height:500px;
    }
    .nav-links{
        gap:20px;
    }
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

    <div class="logo">
        <img src="logo.png" alt="">
    </div>

    <ul class="nav-links">
        <li><a href="dashboard.html">HOME</a></li>
        <li><a href="compare.html">COMPARE</a></li>
        <li><a href="guide.html" class="active">GUIDE</a></li>
        <li><a href="contacts.html">CONTACTS</a></li>
    </ul>

</nav>

<!-- MAIN -->

<div class="main-container">

    <!-- SIDEBAR -->

    <div id="sidebar">
        <h2>GreenWheelz</h2>
        <p>Select a layer to view:</p>
        <button class="filter-btn active-btn" onclick="filterMap('station', this)">
            EV Charging Stations
        </button>
        <button class="filter-btn" onclick="filterMap('hotspot', this)">
            EV Adoption Hotspots
        </button>
        <button class="filter-btn" onclick="filterMap('dealership', this)">
            EV Dealerships
        </button>

        <!-- TIP BOX -->
        <div class="tip-box">
            <small>EV Lifestyle Tips</small>
            <h4>DON'T HOG CHARGERS!</h4>
            <p>
                Move your car once charging is complete.
            </p>
        </div>
    </div>

    <!-- MAP -->
    <div id="map"></div>
</div>

<!-- LEAFLET JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

// CREATE MAP
const map = L.map('map').setView([14.5823, 121.0333], 11);

// MAP TILES

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; OpenStreetMap contributors'
}).addTo(map);

// LOCATIONS
const locations = [

    // BGC TAGUIG
    {
        name:"BGC High Street",
        type:"hotspot",
        lat:14.5518,
        lng:121.0514,
        info:"Major EV hotspot in Taguig"
    },
    {
        name:"SM Aura EV Charger",
        type:"station",
        lat:14.5478,
        lng:121.0544,
        info:"Public EV charging station"
    },

    // MAKATI
    {
        name:"Makati CBD",
        type:"hotspot",
        lat:14.5547,
        lng:121.0244,
        info:"Business district with growing EV users"
    },
    {
        name:"BYD Makati",
        type:"dealership",
        lat:14.5612,
        lng:121.0185,
        info:"Official BYD EV showroom"
    },

    // QUEZON CITY
    {
        name:"Quezon City Circle",
        type:"hotspot",
        lat:14.6507,
        lng:121.0494,
        info:"Popular EV activity area"
    },
    {
        name:"Ayala Malls Vertis North",
        type:"station",
        lat:14.6521,
        lng:121.0361,
        info:"Integrated EV charging hub"
    },

    // ORTIGAS
    {
        name:"Ortigas Center",
        type:"hotspot",
        lat:14.5865,
        lng:121.0611,
        info:"Commercial EV hotspot"
    },
    {
        name:"Estancia EV Charging Area",
        type:"station",
        lat:14.5764,
        lng:121.0635,
        info:"Modern EV charging station"
    },

    // PASIG
    {
        name:"Pasig EV Hub",
        type:"station",
        lat:14.5764,
        lng:121.0851,
        info:"Public EV charging access"
    },

    // PASAY
    {
        name:"SM Mall of Asia Charger",
        type:"station",
        lat:14.5350,
        lng:120.9822,
        info:"Fast EV charging station"
    },
    {
        name:"Nissan Manila Bay",
        type:"dealership",
        lat:14.5370,
        lng:120.9890,
        info:"Nissan EV dealership"
    },

    // ALABANG
    {
        name:"Alabang Town Center",
        type:"hotspot",
        lat:14.4235,
        lng:121.0298,
        info:"Southern Metro EV hotspot"
    },
    {
        name:"Filinvest Alabang Charger",
        type:"station",
        lat:14.4186,
        lng:121.0387,
        info:"EV charging available"
    }
];

// STORE MARKERS
let markers = [];

// RENDER MARKERS
function renderMarkers(filter){

    // REMOVE OLD MARKERS
    markers.forEach(marker=>{
        map.removeLayer(marker);
    });

    markers = [];

    // ADD NEW MARKERS
    locations.forEach(loc=>{

        if(loc.type === filter){
            let color;
            if(loc.type === "station"){
                color = "green";
            }
            else if(loc.type === "hotspot"){
                color = "orange";
            }
            else{
                color = "blue";
            }

            // CREATE MARKER

            const marker = L.circleMarker([loc.lat, loc.lng],{
                radius:10,
                fillColor:color,
                color:"#fff",
                weight:2,
                fillOpacity:0.9

            }).addTo(map);

            // POPUP
            marker.bindPopup(`
                <b>${loc.name}</b><br>
                ${loc.info}
            `);

            // SAVE MARKER
            markers.push(marker);
        }
    });
}

// FILTER BUTTONS

function filterMap(type, button){
    renderMarkers(type);

    // ACTIVE BUTTON
    document.querySelectorAll('.filter-btn').forEach(btn=>{
        btn.classList.remove('active-btn');
    });
    button.classList.add('active-btn');
}

// DEFAULT LOAD
renderMarkers('station');
</script>

</body>
</html>
